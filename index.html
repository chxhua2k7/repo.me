<!DOCTYPE html>
<html lang="en">
  <head>
    <title>chxhua2k7's Repo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
      integrity="sha512-jnSuA4Ss2PkkikSOLtYs8BlYIeeIK1h99ty4YfvRPAlzr377vr3CXDb7sb7eEEBYjDtcYj+AjBH3FLv5uSJuXg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="repo-header">
      <div class="container">
        <div class="d-flex align-items-center">
          <img src="CydiaIcon.png" alt="Repository Icon" />
          <h1>chxhua2k7's Repo</h1>
        </div>
      </div>
    </div>

    <div class="container mb-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title mb-3">chxhua2k7's Repo</h5>
          <p class="card-text mb-4">
            chxhua2k7's jailbreak tweak repository.
          </p>
          <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary" href="sileo://source/https://repo.y00e.org/"
              >Add to Sileo</a
            >
            <a
              class="btn btn-primary"
              href="zbra://sources/add/https://repo.y00e.org/"
              >Add to Zebra</a
            >
            <a class="btn btn-primary" href="apt-repo://https://repo.y00e.org/"
              >Add to Saily</a
            >
            <a
              class="btn btn-primary"
              href="cydia://url/https://cydia.saurik.com/api/share#?source=https://repo.y00e.org/"
              >Add to Cydia</a
            >
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <h2 class="section-title">Featured Packages</h2>
      <div class="row g-4" id="featured-packages">
        <p class="text-secondary">Loading packages…</p>
      </div>
    </div>

    <script>
      function compareVersions(a, b) {
        const split = (v) =>
          (v || "0").split(/[.\-+~:]/).map((x) => parseInt(x, 10) || 0);
        const pa = split(a);
        const pb = split(b);
        for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
          const d = (pa[i] || 0) - (pb[i] || 0);
          if (d !== 0) return d;
        }
        return 0;
      }

      async function loadFeaturedPackages() {
        const container = document.getElementById("featured-packages");
        try {
          const res = await fetch("Packages", { cache: "no-cache" });
          if (!res.ok) throw new Error(res.status);
          const stanzas = (await res.text()).split(/\n\s*\n/);
          const pkgs = new Map();
          for (const stanza of stanzas) {
            const field = (name) => {
              const m = stanza.match(new RegExp("^" + name + ": *(.+)$", "m"));
              return m ? m[1].trim() : "";
            };
            const id = field("Package");
            if (!id) continue;
            const entry = {
              id,
              name: field("Name") || id,
              version: field("Version"),
              description: field("Description") || "No description provided.",
              author: field("Author"),
            };
            const seen = pkgs.get(id);
            if (!seen || compareVersions(entry.version, seen.version) > 0) {
              pkgs.set(id, entry);
            }
          }

          container.textContent = "";
          for (const pkg of [...pkgs.values()].sort((a, b) =>
            a.name.localeCompare(b.name)
          )) {
            const col = document.createElement("div");
            col.className = "col-md-6";

            const card = document.createElement("div");
            card.className = "card";

            const header = document.createElement("div");
            header.className = "card-header";
            header.textContent = `${pkg.name} ${pkg.version}`;

            const body = document.createElement("div");
            body.className = "card-body";

            const desc = document.createElement("p");
            desc.className = "card-text";
            desc.textContent =
              pkg.description + (pkg.author ? ` — ${pkg.author}` : "");

            const btn = document.createElement("a");
            btn.className = "btn btn-primary";
            btn.href = "sileo://package/" + encodeURIComponent(pkg.id);
            btn.textContent = "View in Sileo";

            body.append(desc, btn);
            card.append(header, body);
            col.append(card);
            container.append(col);
          }
          if (pkgs.size === 0) {
            container.innerHTML =
              '<p class="text-secondary">No packages yet.</p>';
          }
        } catch (err) {
          container.innerHTML =
            '<p class="text-secondary">Could not load package list.</p>';
        }
      }

      loadFeaturedPackages();
    </script>
  </body>
</html>
